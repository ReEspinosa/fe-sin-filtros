<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Estudios — Fe Sin Filtros</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="dist/output.css"/>
  <style>
    :root {
      --cream:#fff8f3; --cream-mid:#fbecd9; --cream-dark:#efe0cd;
      --brown:#221a0f; --brown-mid:#54433b;
      --primary:#944a20; --primary-c:#e88d5d;
      --secondary:#725187; --secondary-c:#e8c0ff;
      --gold:#F2C044; --gold-dim:#cb9d21; --rose:#e8a0b4;
    }
    .pill { display:inline-block; padding:3px 12px; border-radius:999px; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; }
    .pill-primary-c  { background:#e88d5d33; color:var(--primary); }
    .pill-gold       { background:#F2C04433; color:var(--gold-dim); }
    .pill-secondary-c{ background:#e8c0ff44; color:var(--secondary); }
    .pill-rose       { background:#e8a0b433; color:#a0456a; }
    .floral { position:absolute; pointer-events:none; z-index:0; }

    /* ── MASONRY PINTEREST ── */
    .masonry-grid {
      columns: 3;
      column-gap: 1.25rem;
    }
    .masonry-item {
      break-inside: avoid;
      margin-bottom: 1.25rem;
      display: block;
    }
    @media (max-width: 1024px) { .masonry-grid { columns: 2; } }
    @media (max-width: 600px)  { .masonry-grid { columns: 1; } }

    /* card hover */
    .video-card {
      background: white;
      border-radius: 1.5rem;
      overflow: hidden;
      border: 1px solid var(--cream-dark);
      box-shadow: 0 4px 16px rgba(74,55,40,.06);
      transition: transform .3s cubic-bezier(.16,1,.3,1), box-shadow .3s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .video-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 16px 40px rgba(74,55,40,.13);
    }
    .video-card:hover .play-btn { transform: scale(1.12); }
    .play-btn { transition: transform .25s; }

    /* thumbnail heights — Pinterest feel */
    .thumb-sm  { aspect-ratio: 4/3; }
    .thumb-md  { aspect-ratio: 1/1; }
    .thumb-lg  { aspect-ratio: 3/4; }
    .thumb-reel{ aspect-ratio: 9/16; max-height: 480px; }

    /* filter pills */
    .filter-btn {
      padding: 8px 18px; border-radius: 999px; font-size: 12px; font-weight: 600;
      letter-spacing: .05em; text-transform: uppercase; border: 1.5px solid var(--cream-dark);
      background: white; color: var(--brown-mid); cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--primary-c); border-color: var(--primary-c); color: white;
    }

    /* search */
    .search-box {
      background: white; border: 1.5px solid var(--cream-dark); border-radius: 999px;
      padding: 10px 20px; display: flex; align-items: center; gap: 8px;
      transition: border-color .2s;
    }
    .search-box:focus-within { border-color: var(--primary-c); }
    .search-box input { border: none; outline: none; background: transparent;
      font-size: 14px; color: var(--brown); width: 200px; }
    .search-box input::placeholder { color: var(--brown-mid); opacity: .6; }

    /* nav */
    .nav-link { font-size:12px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
      color:var(--brown-mid); text-decoration:none; transition:color .2s; }
    .nav-link:hover { color:var(--primary); }
    .btn-primary { background:var(--primary-c); color:white; padding:10px 24px; border-radius:999px;
      font-size:13px; font-weight:600; letter-spacing:.05em; text-transform:uppercase;
      text-decoration:none; transition:all .3s; display:inline-block; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(74,55,40,.15); }

    @keyframes floatA { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-12px) rotate(4deg)} }
    @keyframes floatB { 0%,100%{transform:translateY(0) rotate(0)} 50%{transform:translateY(-8px) rotate(-5deg)} }
    .float-a { animation:floatA 7s ease-in-out infinite; }
    .float-b { animation:floatB 9s ease-in-out infinite; }
  </style>
</head>
<body style="background:var(--cream);color:var(--brown);overflow-x:hidden;font-family:'Plus Jakarta Sans',sans-serif;">

<!-- NAV -->
<nav style="position:fixed;top:0;width:100%;z-index:50;background:rgba(255,248,243,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--cream-dark);">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 64px;max-width:1440px;margin:0 auto;">
    <a href="index.html" class="nav-link" style="font-family:'Playfair Display',serif;font-size:22px;color:var(--primary);font-style:italic;" id="nav-name"></a>
    <div style="display:flex;gap:32px;align-items:center;">
      <a href="index.html#chat"        class="nav-link">Chat IA</a>
      <a href="index.html#testimonios" class="nav-link">Testimonios</a>
      <a href="index.html#contacto"    class="nav-link">Contacto</a>
      <a href="index.html" class="btn-primary">← Inicio</a>
    </div>
  </div>
</nav>

<!-- HEADER -->
<div style="padding:120px 64px 48px;max-width:1440px;margin:0 auto;position:relative;overflow:hidden;">

  <!-- flores header -->
  <div class="floral float-a" style="top:60px;right:40px;opacity:.11;width:200px;">
    <svg viewBox="0 0 300 320" xmlns="http://www.w3.org/2000/svg"><g transform="translate(150,160)"><path d="M0,60 Q-18,30 -10,-20 Q0,-80 5,-140" stroke="#5a7a3a" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M-10,10 Q-60,-10 -55,-50 Q-20,-30 -10,10Z" fill="#7aaa55" opacity=".85"/><path d="M-5,-30 Q40,-55 42,-95 Q10,-65 -5,-30Z" fill="#8abb66" opacity=".75"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#E88D5D" opacity=".9" transform="rotate(0)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#d4744a" opacity=".75" transform="rotate(45)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#E88D5D" opacity=".85" transform="rotate(90)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#c9623a" opacity=".7" transform="rotate(135)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#E88D5D" opacity=".9" transform="rotate(180)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#d4744a" opacity=".75" transform="rotate(225)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#E88D5D" opacity=".85" transform="rotate(270)"/><ellipse cx="0" cy="-155" rx="28" ry="48" fill="#c9623a" opacity=".7" transform="rotate(315)"/><circle cx="0" cy="-155" r="20" fill="#372f22"/><circle cx="0" cy="-155" r="10" fill="#594535"/></g></svg>
  </div>
  <div class="floral float-b" style="bottom:0;left:-20px;opacity:.09;width:160px;">
    <svg viewBox="0 0 180 220" xmlns="http://www.w3.org/2000/svg"><g transform="translate(90,160)"><path d="M0,50 Q-8,20 -5,-40 Q0,-90 2,-150" stroke="#5a7a3a" stroke-width="5" fill="none" stroke-linecap="round"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#F2C044" opacity=".95" transform="rotate(0)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#f1b830" opacity=".85" transform="rotate(45)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#F2C044" opacity=".9" transform="rotate(90)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#f1b830" opacity=".85" transform="rotate(135)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#F2C044" opacity=".95" transform="rotate(180)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#f1b830" opacity=".85" transform="rotate(225)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#F2C044" opacity=".9" transform="rotate(270)"/><ellipse cx="0" cy="-165" rx="12" ry="28" fill="#f1b830" opacity=".85" transform="rotate(315)"/><circle cx="0" cy="-165" r="26" fill="#372f22"/></g></svg>
  </div>

  <p style="font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--brown-mid);margin-bottom:12px;">✦ serie completa</p>
  <h1 style="font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4rem);color:var(--brown);line-height:1.1;margin-bottom:16px;" id="page-title"></h1>
  <p style="font-size:16px;color:var(--brown-mid);max-width:520px;line-height:1.6;margin-bottom:40px;" id="page-desc"></p>

  <!-- search + filters -->
  <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;">
    <div class="search-box">
      <span class="material-symbols-outlined" style="color:var(--brown-mid);font-size:18px;">search</span>
      <input type="text" id="search-input" placeholder="Buscar estudio..." oninput="filterVideos()"/>
    </div>
    <div id="filter-tags" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
  </div>
</div>

<!-- MASONRY GRID -->
<div style="padding:0 64px 80px;max-width:1440px;margin:0 auto;">
  <div class="masonry-grid" id="masonry-grid"></div>
  <div id="no-results" style="display:none;text-align:center;padding:60px 0;">
    <div style="font-size:3rem;margin-bottom:12px;">🌸</div>
    <p style="font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--brown);margin-bottom:8px;">Sin resultados</p>
    <p style="color:var(--brown-mid);font-size:14px;">Intenta con otra palabra o categoría.</p>
  </div>
</div>

<!-- WHATSAPP FLOTANTE -->
<a id="wa-btn" href="#" target="_blank" rel="noopener"
   style="position:fixed;bottom:24px;right:24px;z-index:100;display:flex;align-items:center;gap:8px;background:#25D366;color:white;padding:12px 20px;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none;box-shadow:0 6px 24px rgba(37,211,102,.35);transition:transform .2s;"
   onmouseover="this.style.transform='translateY(-3px)'"
   onmouseout="this.style.transform=''">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.890-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
  Quiero estudiar
</a>

<script src="config.js"></script>
<script>
const colorMap = {
  'primary-c':'#e88d5d', gold:'#F2C044', 'secondary-c':'#e8c0ff', rose:'#e8a0b4'
};
const pillClass = {
  'primary-c':'pill-primary-c', gold:'pill-gold', 'secondary-c':'pill-secondary-c', rose:'pill-rose'
};
// thumbnail aspect ratios — Pinterest feel, cicla entre ellos
const thumbSizes = ['thumb-sm','thumb-md','thumb-lg','thumb-reel','thumb-sm','thumb-md'];

// render page meta
document.getElementById('nav-name').textContent  = CONFIG.siteName;
document.getElementById('page-title').textContent = CONFIG.siteName + ' — Estudios';
document.getElementById('page-desc').textContent  = CONFIG.description;

// WhatsApp
document.getElementById('wa-btn').href =
  `https://wa.me/${CONFIG.whatsapp.number}?text=${encodeURIComponent(CONFIG.whatsapp.message)}`;

// collect unique tags
const allTags = ['Todos', ...new Set(CONFIG.videos.map(v => v.tag))];
let activeTag  = 'Todos';
let searchTerm = '';

// render filter pills
const filterEl = document.getElementById('filter-tags');
function renderFilters() {
  filterEl.innerHTML = allTags.map(t => `
    <button class="filter-btn ${t===activeTag?'active':''}" onclick="setTag('${t}')">${t}</button>
  `).join('');
}

function setTag(tag) { activeTag = tag; renderFilters(); renderGrid(); }

document.getElementById('search-input').addEventListener('input', function() {
  searchTerm = this.value.toLowerCase();
  renderGrid();
});

function renderGrid() {
  const grid = document.getElementById('masonry-grid');
  const none = document.getElementById('no-results');

  const filtered = CONFIG.videos.filter(v => {
    const matchTag    = activeTag === 'Todos' || v.tag === activeTag;
    const matchSearch = !searchTerm ||
      v.title.toLowerCase().includes(searchTerm) ||
      v.description.toLowerCase().includes(searchTerm) ||
      v.tag.toLowerCase().includes(searchTerm);
    return matchTag && matchSearch;
  });

  if (filtered.length === 0) {
    grid.innerHTML = '';
    none.style.display = 'block';
    return;
  }
  none.style.display = 'none';

  grid.innerHTML = filtered.map((v, i) => {
    const size  = thumbSizes[i % thumbSizes.length];
    const bg    = v.thumbnail
      ? `background:url('${v.thumbnail}') center/cover no-repeat`
      : `background:linear-gradient(135deg,${colorMap[v.color]}33,${colorMap[v.color]}88)`;

    return `
    <a href="${v.reelUrl}" target="_blank" rel="noopener"
       class="masonry-item video-card" id="${v.id}">
      <!-- thumbnail -->
      <div class="${size}" style="position:relative;${bg};">
        <div style="position:absolute;inset:0;background:rgba(34,26,15,.08);display:flex;align-items:center;justify-content:center;">
          <div class="play-btn" style="width:52px;height:52px;border-radius:50%;background:rgba(255,248,243,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(74,55,40,.18);">
            <span class="material-symbols-outlined" style="font-size:28px;color:var(--primary-c);">play_arrow</span>
          </div>
        </div>
        <!-- duration badge -->
        <div style="position:absolute;bottom:10px;right:10px;background:rgba(34,26,15,.72);backdrop-filter:blur(4px);color:#fff8f3;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;">${v.duration}</div>
        <!-- tag badge top-left -->
        <div style="position:absolute;top:10px;left:10px;">
          <span class="pill ${pillClass[v.color]}" style="background:rgba(255,248,243,.88);">${v.tag}</span>
        </div>
      </div>
      <!-- info -->
      <div style="padding:16px 18px 20px;">
        <h3 style="font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown);margin-bottom:6px;line-height:1.3;">${v.title}</h3>
        <p style="font-size:13px;color:var(--brown-mid);line-height:1.5;">${v.description}</p>
        <div style="margin-top:12px;display:flex;align-items:center;gap:6px;font-size:12px;color:var(--primary);font-weight:600;">
          <span class="material-symbols-outlined" style="font-size:15px;">open_in_new</span>
          Ver en Instagram
        </div>
      </div>
    </a>`;
  }).join('');

  // scroll to anchor if hash matches a video id
  if (location.hash) {
    const el = document.querySelector(location.hash);
    if (el) setTimeout(() => el.scrollIntoView({behavior:'smooth', block:'center'}), 200);
  }
}

renderFilters();
renderGrid();
</script>
</body>
</html>
